version: "3.9"

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: python-dev-env   # nome dell’immagine che hai costruito
    container_name: code-server-dev
    ports:
      - "8089:8089"
    environment:
      PASSWORD: "changeme"          # meglio sovrascriverla via .env
      BIND_ADDR: "0.0.0.0:8089"
    volumes:
      - ./project:/home/coder/project
      - code-server-data:/home/coder/.local/share/code-server
      - code-server-config:/home/coder/.config/code-server
    restart: unless-stopped

volumes:
  code-server-data:
  code-server-config:
